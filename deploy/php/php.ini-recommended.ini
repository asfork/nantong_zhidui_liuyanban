; 合并到 phpStudy PHP 7.3.4 的 php.ini，不要覆盖老网站使用的 PHP 配置。
date.timezone = Asia/Shanghai
default_charset = UTF-8
display_errors = Off
log_errors = On
memory_limit = 128M
max_execution_time = 30
post_max_size = 2M
upload_max_filesize = 2M
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.save_path = "D:/phpstudy_pro/WWW/liuyanban/var/session"
error_log = "D:/phpstudy_pro/WWW/liuyanban/var/log/php-error.log"

; 在 phpStudy 扩展管理中确认启用，实际 extension_dir 由 phpStudy 管理。
extension=pdo_mysql
