services:
  apache:
    image: httpd:2.4.39
    platform: linux/amd64
    ports:
      - "${REHEARSAL_HTTP_PORT}:80"
    volumes:
      - ${REHEARSAL_APP_DIR}:/var/www/html:ro
      - ./httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    depends_on:
      - php

  php:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "0"
      APP_BASE_PATH: /liuyanban
      APP_TIMEZONE: Asia/Shanghai
      APP_SESSION_NAME: LIUYANBANSESSID
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: zhidui_nantong
      DB_USERNAME: liuyanban_rehearsal
      DB_PASSWORD: rehearsal-app-password
      DB_TIMEZONE: "+08:00"
      ADMIN_TABLE: admin
      ADMIN_ID_COLUMN: id
      ADMIN_USERNAME_COLUMN: username
      ADMIN_PASSWORD_COLUMN: password
      ADMIN_TYPE_COLUMN: user_type
      ADMIN_ALLOWED_TYPES: "1"
      ADMIN_PASSWORD_DRIVER: bcrypt
    volumes:
      - ${REHEARSAL_APP_DIR}:/var/www/html:ro
      - rehearsal-log:/var/www/html/var/log
      - rehearsal-session:/var/www/html/var/session
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql/mysql-server:5.7.26
    platform: linux/amd64
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: zhidui_nantong
      MYSQL_ROOT_PASSWORD: rehearsal-root-password
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prehearsal-root-password"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - rehearsal-mysql:/var/lib/mysql
      - ./legacy-admin.sql:/docker-entrypoint-initdb.d/10-legacy-admin.sql:ro
      - ${REHEARSAL_APP_DIR}/database/production/001_liuyan_schema.sql:/docker-entrypoint-initdb.d/20-liuyan-schema.sql:ro
      - ./grants.sql:/docker-entrypoint-initdb.d/30-grants.sql:ro

volumes:
  rehearsal-log:
  rehearsal-session:
  rehearsal-mysql:
